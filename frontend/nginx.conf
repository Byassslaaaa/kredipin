# Konfigurasi Nginx untuk SPA KrediPin (React Router).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip aset statis.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache aset ber-hash lama; jangan cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: semua rute klien diarahkan ke index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
