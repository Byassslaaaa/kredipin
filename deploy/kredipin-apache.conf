# VirtualHost Apache untuk KrediPin (kredipin.my.id).
# Salin ke /etc/apache2/sites-available/kredipin.conf lalu:
#   a2ensite kredipin && apache2ctl configtest && systemctl reload apache2
#   certbot --apache -d kredipin.my.id        # menerbitkan HTTPS + redirect 80->443
#
# Membutuhkan modul: proxy, proxy_http (sudah aktif di server ini).
# KrediPin berjalan via docker-compose.vps.yml di 127.0.0.1:8090 (frontend) &
# 127.0.0.1:8091 (backend).

<VirtualHost *:80>
    ServerName kredipin.my.id

    ProxyPreserveHost On
    ProxyRequests Off

    # API -> backend FastAPI (prefix /api di-strip oleh trailing slash).
    ProxyPass        /api/  http://127.0.0.1:8091/
    ProxyPassReverse /api/  http://127.0.0.1:8091/

    # Selain itu -> frontend (SPA React via Nginx).
    ProxyPass        /      http://127.0.0.1:8090/
    ProxyPassReverse /      http://127.0.0.1:8090/

    ErrorLog  ${APACHE_LOG_DIR}/kredipin_error.log
    CustomLog ${APACHE_LOG_DIR}/kredipin_access.log combined
</VirtualHost>
